<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메뉴 목록 | Cafe App</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="list.css">
</head>
<body>
  <header class="page-header">
    <div class="container header-inner">
      <a class="brand" href="../">CAFE APP</a>
      <nav class="nav-links" aria-label="고객 메뉴">
        <a href="list" aria-current="page">MENU</a>
        <a href="../basket/list">BASKET <span id="cartCount">0</span></a>
        <a href="../orders/list">ORDERS</a>
        <a href="../my/">MY PAGE</a>
        <a href="#" id="authLink" class="auth-link">LOGIN</a>
      </nav>
    </div>
  </header>

  <main class="container page-main">
    <section class="hero glass">
      <div>
        <p class="eyebrow">Menu</p>
        <h1>오늘의 카페 메뉴</h1>
        <p>따뜻한 커피부터 달콤한 디저트까지, 원하는 메뉴를 빠르게 찾아보세요.</p>
      </div>
    </section>

    <section class="filter-panel glass" aria-label="메뉴 검색과 필터">
      <label class="search-field">
        <span>검색</span>
        <input id="searchInput" type="search" placeholder="메뉴명 또는 설명">
      </label>
      <label>
        <span>카테고리</span>
        <select id="categoryFilter"></select>
      </label>
      <label>
        <span>정렬</span>
        <select id="sortSelect">
          <option value="recommended">추천순</option>
          <option value="name">이름순</option>
          <option value="priceAsc">가격 낮은순</option>
          <option value="priceDesc">가격 높은순</option>
        </select>
      </label>
      <div class="view-toggle-group">
        <span>보기</span>
        <div class="view-toggle" role="group" aria-label="보기 방식">
          <button type="button" id="gridViewBtn" class="view-btn" aria-pressed="true">그리드</button>
          <button type="button" id="listViewBtn" class="view-btn" aria-pressed="false">목록</button>
        </div>
      </div>
    </section>

    <section class="menu-section" aria-label="메뉴 목록">
      <div class="section-heading">
        <h2>전체 메뉴</h2>
        <p id="resultCount">0개 표시 중</p>
      </div>
      <div class="menu-grid" id="menuGrid"></div>
      <p class="empty-state glass" id="emptyState" hidden>조건에 맞는 메뉴가 없습니다.</p>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script src="../js/data.js"></script>
  <script src="../js/utils.js"></script>
  <script src="list.js"></script>
</body>
</html>
