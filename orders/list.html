<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주문 내역 | Cafe App</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="list.css">
</head>
<body>
  <header class="page-header">
    <div class="container header-inner">
      <a class="brand" href="../index.html">CAFE APP</a>
      <nav class="nav-links" aria-label="고객 메뉴">
        <a href="../menus/list.html">MENU</a>
        <a href="../basket/list.html">BASKET <span id="cartCount">0</span></a>
        <a href="list.html" aria-current="page">ORDERS</a>
        <a href="../my/index.html">MY PAGE</a>
        <a href="#" id="authLink" class="auth-link">LOGIN</a>
      </nav>
    </div>
  </header>

  <main class="container page-main">
    <section class="hero glass">
      <div>
        <p class="eyebrow">Orders</p>
        <h1>주문 내역</h1>
        <p>최근 주문한 메뉴와 진행 상태를 한눈에 확인하세요.</p>
      </div>
      <a class="btn btn-primary" href="../menus/list.html">메뉴 보러가기</a>
    </section>

    <section class="summary-grid" aria-label="주문 요약">
      <article class="summary-card glass">
        <span>전체 주문</span>
        <strong id="totalOrders">0</strong>
      </article>
      <article class="summary-card glass">
        <span>진행 중</span>
        <strong id="activeOrders">0</strong>
      </article>
      <article class="summary-card glass">
        <span>누적 금액</span>
        <strong id="totalAmount">0원</strong>
      </article>
    </section>

    <section class="filter-panel glass" aria-label="주문 검색과 필터">
      <label>
        <span>검색</span>
        <input id="searchInput" type="search" placeholder="주문번호 또는 메뉴명">
      </label>
      <label>
        <span>상태</span>
        <select id="statusFilter">
          <option value="all">전체</option>
          <option value="pending">주문 대기</option>
          <option value="confirmed">주문 확인</option>
          <option value="preparing">제조 중</option>
          <option value="ready">픽업 대기</option>
          <option value="completed">완료</option>
          <option value="cancelled">취소</option>
        </select>
      </label>
      <label>
        <span>정렬</span>
        <select id="sortSelect">
          <option value="latest">최근 주문순</option>
          <option value="oldest">오래된 주문순</option>
          <option value="amountDesc">금액 높은순</option>
          <option value="amountAsc">금액 낮은순</option>
        </select>
      </label>
    </section>

    <section class="orders-section" aria-label="주문 내역 목록">
      <div class="section-heading">
        <h2>주문 목록</h2>
        <p id="resultCount">0개 표시 중</p>
      </div>
      <div class="orders-list" id="ordersList"></div>
      <div class="empty-state glass" id="emptyState" hidden>
        <p>아직 표시할 주문 내역이 없습니다.</p>
        <a class="btn btn-primary" href="../menus/list.html">첫 주문하러 가기</a>
      </div>
    </section>
  </main>

  <script src="../js/utils.js"></script>
  <script src="list.js"></script>
</body>
</html>
