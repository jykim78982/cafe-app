<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장바구니 | Cafe App</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="list.css">
</head>
<body>
  <header class="page-header">
    <div class="container header-inner">
      <a class="brand" href="../index.html">CAFE APP</a>
      <nav class="nav-links" aria-label="고객 메뉴">
        <a href="../menus/list.html">MENU</a>
        <a href="list.html" aria-current="page">BASKET <span id="cartCount">0</span></a>
        <a href="../orders/list.html">ORDERS</a>
        <a href="../my/index.html">MY PAGE</a>
        <a href="#" id="authLink" class="auth-link">LOGIN</a>
      </nav>
    </div>
  </header>

  <main class="container page-main">
    <section class="hero glass">
      <div>
        <p class="eyebrow">Basket</p>
        <h1>장바구니</h1>
        <p>담아두신 메뉴를 확인하고 수량을 조절해보세요.</p>
      </div>
    </section>

    <section class="basket-section" aria-label="장바구니 목록">
      <div class="basket-list" id="basketList"></div>
      <p class="empty-state glass" id="emptyState" hidden>장바구니가 비어있습니다. <a href="../menus/list.html">메뉴 보러가기</a></p>

      <div class="summary-card glass" id="summaryCard">
        <div class="summary-row">
          <span>총 수량</span>
          <strong id="totalCount">0개</strong>
        </div>
        <div class="summary-row total-row">
          <span>합계</span>
          <strong id="totalPrice">0원</strong>
        </div>
        <button class="btn btn-primary btn-block" type="button" id="checkoutButton">주문하기</button>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <div class="payment-overlay" id="paymentOverlay" hidden>
    <div class="payment-modal glass" role="dialog" aria-modal="true" aria-labelledby="paymentTitle">
      <p class="payment-eyebrow">Mock Payment</p>
      <h2 id="paymentTitle">모의 결제</h2>
      <p class="payment-desc">실제로 결제되지 않는 테스트용 모의 결제입니다.</p>

      <div class="payment-summary">
        <div class="payment-row">
          <span>주문 수량</span>
          <strong id="paymentCount">0개</strong>
        </div>
        <div class="payment-row payment-total">
          <span>결제 금액</span>
          <strong id="paymentAmount">0원</strong>
        </div>
      </div>

      <div class="payment-method">
        <span class="payment-method-label">결제 수단</span>
        <div class="payment-options" id="paymentOptions">
          <label class="payment-option">
            <input type="radio" name="paymentMethod" value="카드" checked>
            <span>카드</span>
          </label>
          <label class="payment-option">
            <input type="radio" name="paymentMethod" value="네이버페이">
            <span>네이버페이</span>
          </label>
          <label class="payment-option">
            <input type="radio" name="paymentMethod" value="카카오페이">
            <span>카카오페이</span>
          </label>
        </div>
      </div>

      <div class="payment-actions" id="paymentActions">
        <button type="button" class="btn btn-outline" id="paymentCancel">취소</button>
        <button type="button" class="btn btn-primary" id="paymentConfirm">결제하기</button>
      </div>

      <div class="payment-processing" id="paymentProcessing" hidden>
        <span class="payment-spinner" aria-hidden="true"></span>
        <span>결제를 처리하고 있습니다...</span>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/utils.js"></script>
  <script src="list.js"></script>
</body>
</html>
