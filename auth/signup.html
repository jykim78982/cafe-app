<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 | Cafe App</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="signup.css">
</head>
<body>
  <main class="auth-page">
    <div class="container auth-container">
      <a class="auth-logo" href="../index.html">CAFE APP</a>
      <div class="auth-card glass">
        <p class="eyebrow">Sign Up</p>
        <h1>회원가입</h1>
        <p class="auth-desc">카페 앱에서 사용할 계정을 만들어주세요.</p>

        <form id="signupForm" novalidate>
          <p class="form-error" id="formError" hidden></p>
          <div class="form-group">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" autocomplete="name" required>
          </div>
          <div class="form-group">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" autocomplete="new-password" minlength="4" required>
          </div>
          <div class="form-group">
            <label for="passwordConfirm">비밀번호 확인</label>
            <input type="password" id="passwordConfirm" name="passwordConfirm" autocomplete="new-password" minlength="4" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">회원가입</button>
        </form>

        <p class="auth-hint">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
      </div>
    </div>
  </main>
  <script src="../js/data.js"></script>
  <script src="../js/utils.js"></script>
  <script src="signup.js"></script>
</body>
</html>
